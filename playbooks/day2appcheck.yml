---
- name: Check system status via JSON health endpoint
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Fetch health check response
      register: health_response  # Store response in 'health_response' variable
      loop: "{{ groups['tag_Type_ml_demo'] }}"
      ansible.builtin.uri:
        url: "http://{{ item }}"  # Replace with your endpoint
        method: GET
        return_content: yes  # Capture response body
        status_code: 200  # Expect 200 OK (adjust if your endpoint uses 201, 204, etc.)

    - name: Print raw JSON response
      ansible.builtin.debug:
        var: health_response.json  # Access parsed JSON via .json attribute
        verbosity: 1  # Show only when running with -v (optional)

    - name: Check if system is UP
      ansible.builtin.debug:
        msg: "✅ System is UP (Last checked: {{ health_response.json.timestamp }})"
      when: health_response.json.status == "UP"  # Conditional check

    - name: Fail if system is DOWN
      ansible.builtin.fail:
        msg: "❌ System is DOWN (Last checked: {{ health_response.json.timestamp }})"
      when: health_response.json.status == "DOWN"  # Conditional check
