---
- name: Check system status via JSON health endpoint
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Fetch health check response
      register: health_response  # Store response in 'health_response' variable
      loop: "{{ groups['tag_Type_ml_demo'] }}"
      ansible.builtin.uri:
        url: "http://{{ item }}"  # Replace with your endpoint
        method: GET
        return_content: yes  # Capture response body
        status_code: 200  # Expect 200 OK (adjust if your endpoint uses 201, 204, etc.)
