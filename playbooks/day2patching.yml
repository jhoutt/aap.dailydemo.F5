---
- name: Patch my system
  hosts: tag_Type_ml_demo
  gather_facts: false
  become: true
  serial: 1
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:

    - name: Disable member at the loadbalancer
      loop: "{{ groups['f5demo'] }}"
      ansible.builtin.debug:
        msg: "{{ item }}"

    - name: Ensure httpd service is stopped and disabled
      ansible.builtin.service:
        name: httpd
        state: stopped
        enabled: false

    - name: Upgrade all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
        security: true
        bugfix: true
        update_only: true
        skip_broken: true

    - name: Update Red Hat Insights after package updates
      register: result
      changed_when: result.rc == 1
      failed_when: result.rc > 1
      ansible.builtin.command: insights-client --register --build-packagecache

    - name: Check to see if we need a reboot
      register: reboot_required
      ansible.builtin.stat:
        path: /var/run/reboot-required

    - name: Reboot the machine if it is required
      when: reboot_required.stat.exists
      ansible.builtin.reboot:

    - name: Ensure httpd service is started and enabled
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Fetch health check from our webservers
      register: webcheck
      until: webcheck.status == 200
      ignore_errors: true
      retries: 30
      delay: 2
      ansible.builtin.uri:
        url: "http://{{ inventory_hostname }}"  # Replace with your endpoint
        method: GET
        return_content: yes  # Capture response body
        status_code: 200  # Expect 200 OK (adjust if your endpoint uses 201, 204, etc.)
