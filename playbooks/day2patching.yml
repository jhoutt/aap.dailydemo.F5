---
- name: Patch my system
  hosts: tag_Type_ml_demo
  gather_facts: false
  serial: 1
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:

    - name: Determine that a network credential exists
      ansible.builtin.assert:
        that:
          - "lookup('ansible.builtin.env', 'username') !=''"
          - "lookup('ansible.builtin.env', 'password') !=''"
        fail_msg:
          - "A Network credential is not set"
          - "Please assign correct credentials to the Job Template"

    - name: Get the F5
      loop: "{{ groups['f5demo'] }}"
      ansible.builtin.set_fact:
        f5: "{{ item }}"
        F5_mgmt_ip: "{{ hostvars[item]['F5_mgmt_ip'] }}"

    - name: Print out F5_mgmt_ip
      ansible.builtin.debug:
        msg:
          - "Ansible Host: {{ ansible_host }}"
          - "F5 Management IP: {{ F5_mgmt_ip }}"
          - "F5 Public DNS Name: {{ f5 }}"

    - name: Setup provider
      ansible.builtin.set_fact:
        provider:
          server: "{{ F5_mgmt_ip }}"
          server_port: "8443"
          validate_certs: "no"
          user: "{{ lookup('ansible.builtin.env', 'username') }}"
          password: "{{ lookup('ansible.builtin.env', 'password') }}"

    - name: Disable pool member
      delegate_to: localhost
      become: false
      f5networks.f5_modules.bigip_pool_member:
        provider: "{{provider}}"
        state: "forced_offline"
        name: "{{ inventory_hostname }}"
        pool: "http_pool"
        port: 80
        host: "{{ ansible_host }}"

    - name: Ensure httpd service is stopped and disabled
      ansible.builtin.service:
        name: httpd
        state: stopped
        enabled: false

    - name: Upgrade all packages
      ansible.builtin.dnf:
        name: sudo
        state: latest
        security: true
        bugfix: true
        update_only: true
        skip_broken: true

    - name: Update Red Hat Insights after package updates
      register: result
      changed_when: result.rc == 1
      failed_when: result.rc > 1
      ansible.builtin.command: insights-client --register --build-packagecache

    - name: Check to see if we need a reboot
      register: reboot_required
      ansible.builtin.stat:
        path: /var/run/reboot-required

    - name: Reboot the machine if it is required
      when: reboot_required.stat.exists
      ansible.builtin.reboot:

    - name: Ensure httpd service is started and enabled
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Fetch health check from our webservers
      register: webcheck
      until: webcheck.status == 200
      ignore_errors: true
      retries: 30
      delay: 2
      ansible.builtin.uri:
        url: "http://{{ inventory_hostname }}"  # Replace with your endpoint
        method: GET
        return_content: yes  # Capture response body
        status_code: 200  # Expect 200 OK (adjust if your endpoint uses 201, 204, etc.)

    - name: Enable pool member
      delegate_to: localhost
      become: false
      f5networks.f5_modules.bigip_pool_member:
        provider: "{{provider}}"
        state: "present"
        name: "{{ inventory_hostname }}"
        pool: "http_pool"
        port: 80
        host: "{{ ansible_host }}"
